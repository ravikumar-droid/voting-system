name: Fast Register Backend
on:
  workflow_dispatch:
    inputs:
      payload:
        required: true

jobs:
  register-logic:
    runs-on: ubuntu-latest
    steps:
      - name: Execute Fast Registration
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          PAYLOAD: ${{ github.event.inputs.payload }}
        run: |
          # Running pure Node.js immediately (Pre-installed on Ubuntu)
          node -e "
          async function run() {
            const payload = JSON.parse(process.env.PAYLOAD);
            const gistId = process.env.GIST_ID;
            const gistToken = process.env.GIST_TOKEN;
            const gistUrl = 'https://api.github.com/gists/' + gistId;
            const headers = { 
              'Authorization': 'token ' + gistToken, 
              'Accept': 'application/vnd.github.v3+json',
              'Content-Type': 'application/json'
            };
            
            const crypto = require('crypto');
            // Fast SHA256 hashing (built-in, no npm install needed)
            const hash = (p) => crypto.createHash('sha256').update(p).digest('hex');

            try {
              // 1. Fetch current users from Gist
              const gistReq = await fetch(gistUrl, { headers });
              const gistData = await gistReq.json();
              let users = JSON.parse(gistData.files['users.json'].content || '[]');

              // 2. Logic: Check if user exists
              if (users.find(u => u.username === payload.username)) {
                throw new Error('Username already exists');
              }

              // 3. Create User Object
              const newUser = {
                id: crypto.randomUUID(),
                username: payload.username,
                password: hash(payload.password),
                role: 'user',
                status: 'approved', // Auto-approve for speed
                token: null
              };
              users.push(newUser);

              // 4. Batch Update: Save users and response file in ONE call
              const response = await fetch(gistUrl, {
                method: 'PATCH',
                headers,
                body: JSON.stringify({
                  files: {
                    'users.json': { content: JSON.stringify(users) },
                    ['res-' + payload.requestId + '.json']: { 
                      content: JSON.stringify({ status: 200, message: 'Registration Successful!' }) 
                    }
                  }
                })
              });

              if (response.ok) console.log('Registration Processed in seconds');

            } catch (e) {
              // Write error response back to Gist so frontend stops waiting
              await fetch(gistUrl, {
                method: 'PATCH',
                headers,
                body: JSON.stringify({
                  files: { 
                    ['res-' + payload.requestId + '.json']: { 
                      content: JSON.stringify({ status: 400, error: e.message }) 
                    } 
                  }
                })
              });
              process.exit(1);
            }
          }
          run();
          "
