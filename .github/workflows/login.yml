name: Login Backend
on:
  repository_dispatch:
    types: [login]

jobs:
  process-login:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v3
      - run: npm install mongodb bcryptjs crypto
      - env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          PAYLOAD: ${{ toJSON(github.event.client_payload) }}
        run: |
          cat << 'EOF' > index.js
          const { MongoClient } = require('mongodb');
          const bcrypt = require('bcryptjs');
          const crypto = require('crypto');
          async function run() {
            const payload = JSON.parse(process.env.PAYLOAD);
            const client = new MongoClient(process.env.MONGO_URI);
            await client.connect();
            const db = client.db('voting_db');
            try {
              const user = await db.collection('Users').findOne({ username: payload.username });
              if (!user) throw new Error("Invalid credentials");
              if (user.status === 'pending') throw new Error("Account pending admin approval");
              if (user.status === 'blocked') throw new Error("Account blocked");
              
              const isValid = await bcrypt.compare(payload.password, user.password);
              if (!isValid) throw new Error("Invalid credentials");
              
              const token = crypto.randomUUID();
              await db.collection('Users').updateOne({ _id: user._id }, { $set: { token } });
              
              await db.collection('Responses').insertOne({ 
                requestId: payload.requestId, status: 200, 
                data: { token, role: user.role, username: user.username, userId: user._id.toString() }
              });
            } catch (error) {
              await db.collection('Responses').insertOne({ requestId: payload.requestId, status: 400, data: { error: error.message }});
            } finally {
              await client.close();
            }
          }
          run();
          EOF
          node index.js
