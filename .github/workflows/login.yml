name: Fast Login Backend
on:
  workflow_dispatch:
    inputs:
      payload:
        required: true

jobs:
  login-logic:
    runs-on: ubuntu-latest
    steps:
      - name: Execute Fast Login
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          PAYLOAD: ${{ github.event.inputs.payload }}
        run: |
          # Running pure Node.js immediately (using pre-installed environment)
          node -e "
          async function run() {
            const payload = JSON.parse(process.env.PAYLOAD);
            const gistId = process.env.GIST_ID;
            const gistToken = process.env.GIST_TOKEN;
            const gistUrl = 'https://api.github.com/gists/' + gistId;
            const headers = { 
              'Authorization': 'token ' + gistToken, 
              'Accept': 'application/vnd.github.v3+json',
              'Content-Type': 'application/json'
            };
            
            const crypto = require('crypto');
            // SHA256 Hashing for fast password verification
            const hash = (p) => crypto.createHash('sha256').update(p).digest('hex');

            try {
              // 1. Fetch current database from Gist
              const gistReq = await fetch(gistUrl, { headers });
              const gistData = await gistReq.json();
              
              let users = JSON.parse(gistData.files['users.json'].content || '[]');
              
              // 2. Logic: Find User
              const userIndex = users.findIndex(u => u.username === payload.username);
              if (userIndex === -1) throw new Error('Invalid credentials');

              const user = users[userIndex];

              // 3. Logic: Verify Password & Status
              if (user.password !== hash(payload.password)) throw new Error('Invalid credentials');
              if (user.status === 'pending') throw new Error('Account pending admin approval');
              if (user.status === 'blocked') throw new Error('Account blocked');

              // 4. Generate Session Token
              const newToken = crypto.randomUUID();
              users[userIndex].token = newToken; // Update the token in our list

              const responseData = { 
                status: 200, 
                token: newToken, 
                role: user.role, 
                username: user.username, 
                userId: user.id 
              };

              // 5. Batch Update: Save User List and Response File in ONE PATCH
              const response = await fetch(gistUrl, {
                method: 'PATCH',
                headers,
                body: JSON.stringify({
                  files: {
                    'users.json': { content: JSON.stringify(users) },
                    ['res-' + payload.requestId + '.json']: { 
                      content: JSON.stringify(responseData) 
                    }
                  }
                })
              });

              if (response.ok) console.log('Login Processed in seconds');

            } catch (e) {
              // Send error response back to Gist so frontend stops waiting
              await fetch(gistUrl, {
                method: 'PATCH',
                headers,
                body: JSON.stringify({
                  files: { 
                    ['res-' + payload.requestId + '.json']: { 
                      content: JSON.stringify({ status: 400, error: e.message }) 
                    } 
                  }
                })
              });
              process.exit(1);
            }
          }
          run();
          "
