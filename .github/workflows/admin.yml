name: Admin Backend (Gist DB)
on:
  workflow_dispatch:
    inputs:
      payload:
        required: true

permissions:
  contents: write

jobs:
  admin-logic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - name: Process Admin Action
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          PAYLOAD: ${{ github.event.inputs.payload }}
        run: |
          node -e "
          async function run() {
            const payload = JSON.parse(process.env.PAYLOAD);
            const gistId = process.env.GIST_ID;
            const gistToken = process.env.GIST_TOKEN;
            const gistUrl = 'https://api.github.com/gists/' + gistId;
            const headers = { 'Authorization': 'token ' + gistToken, 'Accept': 'application/vnd.github.v3+json' };
            
            try {
              const gistReq = await fetch(gistUrl, { headers });
              const gistData = await gistReq.json();
              
              let users = JSON.parse(gistData.files['users.json'].content || '[]');
              let polls = JSON.parse(gistData.files['polls.json']?.content || '[]');
              let responseData = {};

              // 1. SECURITY: Verify Admin Role
              const adminUser = users.find(u => u.token === payload.token && u.role === 'admin');
              if (!adminUser) throw new Error('Unauthorized: Admin access required');

              // 2. ACTION: Create New Blind Poll
              if (payload.actionType === 'admin_create_poll') {
                const newPoll = { 
                  id: 'poll_' + Date.now(), 
                  question: payload.question, 
                  options: payload.options, 
                  results: payload.options.map(() => 0),
                  status: 'active',
                  showResults: false, // <--- HIDDEN BY DEFAULT
                  createdAt: new Date().toISOString()
                };
                polls.push(newPoll);
                responseData = { status: 200, message: 'Blind Election started!' };
              } 
              
              // 3. ACTION: Toggle Results Visibility (REVEAL / HIDE)
              else if (payload.actionType === 'admin_toggle_results') {
                const poll = polls.find(p => p.id === payload.pollId);
                if (!poll) throw new Error('Poll not found');
                
                poll.showResults = !poll.showResults; // Flip the visibility switch
                responseData = { status: 200, message: poll.showResults ? 'Results are now PUBLIC' : 'Results are now HIDDEN' };
              }

              // 4. ACTION: Toggle Poll Status (STOP / START)
              else if (payload.actionType === 'admin_toggle_poll') {
                const poll = polls.find(p => p.id === payload.pollId);
                if (!poll) throw new Error('Poll not found');
                
                poll.status = (poll.status === 'active') ? 'closed' : 'active';
                responseData = { status: 200, message: 'Election status updated!' };
              }

              // 5. ACTION: Delete Poll
              else if (payload.actionType === 'admin_delete_poll') {
                polls = polls.filter(p => p.id !== payload.pollId);
                responseData = { status: 200, message: 'Election deleted.' };
              }

              // 6. ACTION: Approve Pending User
              else if (payload.actionType === 'admin_approve_user') {
                const user = users.find(u => u.id === payload.targetUserId);
                if (user) user.status = 'approved';
                responseData = { status: 200, message: 'User approved!' };
              }

              // 7. SYNC DATA TO GIST
              await fetch(gistUrl, {
                method: 'PATCH',
                headers,
                body: JSON.stringify({
                  files: {
                    'users.json': { content: JSON.stringify(users, null, 2) },
                    'polls.json': { content: JSON.stringify(polls, null, 2) },
                    'public_polls.json': { content: JSON.stringify(polls, null, 2) },
                    ['res-' + payload.requestId + '.json']: { content: JSON.stringify(responseData) }
                  }
                })
              });
              
              console.log('Admin Operation Success');

            } catch (e) {
              console.error('Admin Error:', e.message);
              await fetch(gistUrl, {
                method: 'PATCH',
                headers,
                body: JSON.stringify({
                  files: { 
                    ['res-' + payload.requestId + '.json']: { 
                      content: JSON.stringify({ status: 400, error: e.message }) 
                    } 
                  }
                })
              });
            }
          }
          run();
          "
