name: Fast Admin Backend
on:
  workflow_dispatch:
    inputs:
      payload:
        required: true

jobs:
  admin-logic:
    runs-on: ubuntu-latest # Pre-warmed runner
    steps:
      - name: Execute Rapid Admin Action
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          PAYLOAD: ${{ github.event.inputs.payload }}
        run: |
          # No setup steps - executing logic immediately
          node -e "
          async function run() {
            const payload = JSON.parse(process.env.PAYLOAD);
            const gistUrl = 'https://api.github.com/gists/' + process.env.GIST_ID;
            const headers = { 
              'Authorization': 'token ' + process.env.GIST_TOKEN, 
              'Accept': 'application/vnd.github.v3+json',
              'Content-Type': 'application/json'
            };
            
            try {
              // 1. Single-fetch for all DB files
              const gistReq = await fetch(gistUrl, { headers });
              const gistData = await gistReq.json();
              
              let users = JSON.parse(gistData.files['users.json'].content || '[]');
              let polls = JSON.parse(gistData.files['polls.json']?.content || '[]');
              let responseData = {};

              // 2. SECURITY: Validate Admin
              const admin = users.find(u => u.token === payload.token && u.role === 'admin');
              if (!admin) throw new Error('Unauthorized');

              // 3. EXECUTE ACTION
              const act = payload.actionType;
              if (act === 'admin_create_poll') {
                polls.push({ 
                  id: 'p' + Date.now(), 
                  question: payload.question, 
                  options: payload.options, 
                  results: payload.options.map(() => 0),
                  status: 'active',
                  showResults: false 
                });
                responseData = { status: 200, message: 'Poll Created' };
              } 
              else if (act === 'admin_toggle_results') {
                const p = polls.find(x => x.id === payload.pollId);
                if (p) p.showResults = !p.showResults;
                responseData = { status: 200 };
              }
              else if (act === 'admin_toggle_poll') {
                const p = polls.find(x => x.id === payload.pollId);
                if (p) p.status = (p.status === 'active') ? 'closed' : 'active';
                responseData = { status: 200 };
              }
              else if (act === 'admin_delete_poll') {
                polls = polls.filter(x => x.id !== payload.pollId);
                responseData = { status: 200 };
              }
              else if (act === 'admin_approve_user') {
                const u = users.find(x => x.id === payload.targetUserId);
                if (u) u.status = 'approved';
                responseData = { status: 200 };
              }

              // 4. ATOMIC UPDATE: Sync all files in one API call
              // Removing formatting from stringify to reduce payload size and latency
              await fetch(gistUrl, {
                method: 'PATCH',
                headers,
                body: JSON.stringify({
                  files: {
                    'users.json': { content: JSON.stringify(users) },
                    'polls.json': { content: JSON.stringify(polls) },
                    'public_polls.json': { content: JSON.stringify(polls) },
                    ['res-' + payload.requestId + '.json']: { content: JSON.stringify(responseData) }
                  }
                })
              });
              console.log('Success');

            } catch (e) {
              await fetch(gistUrl, {
                method: 'PATCH',
                headers,
                body: JSON.stringify({
                  files: { ['res-' + payload.requestId + '.json']: { content: JSON.stringify({ status: 400, error: e.message }) } }
                })
              });
              process.exit(1);
            }
          }
          run();
          "
