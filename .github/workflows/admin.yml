on:
  workflow_dispatch:
    inputs:
      payload:
        required: true

jobs:
  admin:
    runs-on: ubuntu-20.04 # 20.04 boots faster than 'latest' or 22.04
    steps:
      - env:
          G: ${{ secrets.GIST_TOKEN }}
          I: ${{ secrets.GIST_ID }}
          P: ${{ github.event.inputs.payload }}
        run: |
          # Turbo-Naked Execution: No checkout, No setup. Execution starts in < 2s.
          node -e "
          async function turbo() {
            const p = JSON.parse(process.env.P);
            const u = 'https://api.github.com/gists/' + process.env.I;
            const h = { 'Authorization': 'token ' + process.env.G, 'Accept': 'application/vnd.github.v3+json' };
            
            try {
              const g = await (await fetch(u, { headers: h })).json();
              
              let us = JSON.parse(g.files['users.json'].content);
              let po = JSON.parse(g.files['polls.json'].content || '[]');
              let resData = { status: 200 };

              // Security: Quick Admin Check
              const admin = us.find(x => x.token === p.token && x.role === 'admin');
              if (!admin) throw new Error('Unauthorized');

              // Logic Switch (High Speed Filter/Map)
              const act = p.actionType;
              if (act === 'admin_create_poll') {
                po.push({ id: 'p' + Date.now(), question: p.question, options: p.options, results: p.options.map(() => 0), status: 'active', showResults: false });
              } else if (act === 'admin_toggle_results') {
                const x = po.find(d => d.id === p.pollId); if (x) x.showResults = !x.showResults;
              } else if (act === 'admin_toggle_poll') {
                const x = po.find(d => d.id === p.pollId); if (x) x.status = x.status === 'active' ? 'closed' : 'active';
              } else if (act === 'admin_delete_poll') {
                po = po.filter(d => d.id !== p.pollId);
              } else if (act === 'admin_approve_user') {
                const x = us.find(d => d.id === p.targetUserId); if (x) x.status = 'approved';
              }

              // Batch Update (Single API Call)
              await fetch(u, {
                method: 'PATCH',
                headers: h,
                body: JSON.stringify({
                  files: {
                    'users.json': { content: JSON.stringify(us) },
                    'polls.json': { content: JSON.stringify(po) },
                    'public_polls.json': { content: JSON.stringify(po) },
                    ['res-' + p.requestId + '.json']: { content: JSON.stringify(resData) }
                  }
                })
              });
            } catch (e) {
              await fetch(u, {
                method: 'PATCH',
                headers: h,
                body: JSON.stringify({ files: { ['res-' + p.requestId + '.json']: { content: JSON.stringify({ status: 400, error: e.message }) } } })
              });
            }
          }
          turbo();
          "
