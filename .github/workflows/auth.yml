on:
  workflow_dispatch:
    inputs:
      payload:
        required: true

jobs:
  auth:
    runs-on: ubuntu-20.04 # Faster startup than ubuntu-latest/22.04
    steps:
      - name: Turbo
        env:
          G: ${{ secrets.GIST_TOKEN }}
          I: ${{ secrets.GIST_ID }}
          P: ${{ github.event.inputs.payload }}
        run: |
          # Naked Execution: No checkout, No setup. Starts in < 2s.
          node -e "
          async function f(){
            const p=JSON.parse(process.env.P),u='https://api.github.com/gists/'+process.env.I,h={'Authorization':'token '+process.env.G,'Accept':'application/vnd.github.v3+json'};
            try{
              const g=await(await fetch(u,{headers:h})).json();
              let us=JSON.parse(g.files['users.json'].content||'[]'),rd={},crypto=require('crypto');
              const ha=(t)=>crypto.createHash('sha256').update(t).digest('hex');
              
              if(p.actionType==='register'){
                if(us.find(x=>x.username===p.username))throw new Error('Taken');
                us.push({id:crypto.randomUUID(),username:p.username,password:ha(p.password),status:'approved',token:null,role:'user'});
                rd={status:200,message:'Success'};
              }else{
                const x=us.find(d=>d.username===p.username&&d.password===ha(p.password));
                if(!x)throw new Error('Invalid');
                const t=crypto.randomUUID();x.token=t;
                rd={status:200,token:t,username:x.username,role:x.role};
              }
              
              await fetch(u,{method:'PATCH',headers:h,body:JSON.stringify({files:{'users.json':{content:JSON.stringify(us)},['res-'+p.requestId+'.json']:{content:JSON.stringify(rd)}}})});
            }catch(e){
              await fetch(u,{method:'PATCH',headers:h,body:JSON.stringify({files:{['res-'+p.requestId+'.json']:{content:JSON.stringify({status:400,error:e.message})}}})});
            }
          }
          f();"
