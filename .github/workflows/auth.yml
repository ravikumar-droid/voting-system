name: Fast Auth Backend
on:
  workflow_dispatch:
    inputs:
      payload:
        required: true

jobs:
  auth-logic:
    runs-on: ubuntu-latest # Fastest startup environment
    steps:
      - name: Execute Rapid Auth
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          PAYLOAD: ${{ github.event.inputs.payload }}
        run: |
          # Running naked Node.js - skipping checkout and setup steps to save ~15s
          node -e "
          async function run() {
            const crypto = require('crypto');
            const payload = JSON.parse(process.env.PAYLOAD);
            const gistUrl = 'https://api.github.com/gists/' + process.env.GIST_ID;
            const headers = { 
              'Authorization': 'token ' + process.env.GIST_TOKEN, 
              'Accept': 'application/vnd.github.v3+json',
              'Content-Type': 'application/json'
            };
            
            const hash = (p) => crypto.createHash('sha256').update(p).digest('hex');

            try {
              // 1. Fetch DB in one request
              const gistReq = await fetch(gistUrl, { headers });
              const gistData = await gistReq.json();
              let users = JSON.parse(gistData.files['users.json'].content || '[]');
              let responseData = {};

              // 2. Logic Execution
              if (payload.actionType === 'register') {
                if (users.find(u => u.username === payload.username)) throw new Error('Username Taken');
                
                users.push({ 
                  id: crypto.randomUUID(), 
                  username: payload.username, 
                  password: hash(payload.password), 
                  status: 'approved', 
                  token: null, 
                  role: 'user' 
                });
                responseData = { status: 200, message: 'Account Created' };
              } 
              else {
                const user = users.find(u => u.username === payload.username && u.password === hash(payload.password));
                if (!user) throw new Error('Invalid Credentials');
                
                const token = crypto.randomUUID();
                user.token = token;
                responseData = { status: 200, token, username: user.username, role: user.role };
              }

              // 3. Atomic Patch (Saves both user list and the unique response file)
              await fetch(gistUrl, {
                method: 'PATCH',
                headers,
                body: JSON.stringify({
                  files: {
                    'users.json': { content: JSON.stringify(users) },
                    ['res-' + payload.requestId + '.json']: { content: JSON.stringify(responseData) }
                  }
                })
              });
              
              console.log('Auth Success');

            } catch (e) {
              // Fail-safe response so frontend stops waiting
              await fetch(gistUrl, {
                method: 'PATCH',
                headers,
                body: JSON.stringify({
                  files: { 
                    ['res-' + payload.requestId + '.json']: { 
                      content: JSON.stringify({ status: 400, error: e.message }) 
                    } 
                  }
                })
              });
              process.exit(1);
            }
          }
          run();
          "
