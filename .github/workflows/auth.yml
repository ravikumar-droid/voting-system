name: Auth Backend (Gist DB)
on:
  workflow_dispatch:
    inputs:
      payload:
        description: 'JSON Payload'
        required: true

permissions:
  contents: write 

jobs:
  auth-logic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - name: Process Auth
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          PAYLOAD: ${{ github.event.inputs.payload }}
        run: |
          node -e "
          const fs = require('fs');
          const crypto = require('crypto');
          const hash = (p) => crypto.createHash('sha256').update(p).digest('hex');

          async function run() {
            const payload = JSON.parse(process.env.PAYLOAD);
            const gistUrl = 'https://api.github.com/gists/' + process.env.GIST_ID;
            const headers = { 'Authorization': 'token ' + process.env.GIST_TOKEN, 'Accept': 'application/vnd.github.v3+json' };
            
            const gistReq = await fetch(gistUrl, { headers });
            const gistData = await gistReq.json();
            let users = JSON.parse(gistData.files['users.json'].content || '[]');
            let responseData = {};

            try {
                if (payload.actionType === 'register') {
                    if (users.find(u => u.username === payload.username)) throw new Error('Username taken');
                    users.push({ id: crypto.randomUUID(), username: payload.username, password: hash(payload.password), status: 'approved', token: null, role: 'user' });
                    responseData = { status: 200, message: 'Registered successfully!' };
                } else {
                    const user = users.find(u => u.username === payload.username && u.password === hash(payload.password));
                    if (!user) throw new Error('Invalid username or password');
                    const token = crypto.randomUUID();
                    user.token = token;
                    responseData = { status: 200, token, username: user.username, role: user.role };
                }

                await fetch(gistUrl, {
                    method: 'PATCH',
                    headers,
                    body: JSON.stringify({
                        files: {
                            'users.json': { content: JSON.stringify(users, null, 2) },
                            ['res-' + payload.requestId + '.json']: { content: JSON.stringify(responseData) }
                        }
                    })
                });
            } catch (e) {
                await fetch(gistUrl, {
                    method: 'PATCH',
                    headers,
                    body: JSON.stringify({ files: { ['res-' + payload.requestId + '.json']: { content: JSON.stringify({ status: 400, error: e.message }) } } })
                });
            }
          }
          run();
          "
