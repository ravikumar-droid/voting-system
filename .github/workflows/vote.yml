name: Fast Vote Backend
on:
  workflow_dispatch:
    inputs:
      payload:
        required: true

# Database safety remains priority
concurrency: 
  group: gist-database-lock
  cancel-in-progress: false 

jobs:
  vote-logic:
    runs-on: ubuntu-latest # Fastest startup runner
    steps:
      - name: Execute Fast Logic
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          PAYLOAD: ${{ github.event.inputs.payload }}
        run: |
          # No checkout or setup-node. Running pure Node.js immediately.
          node -e "
          async function run() {
            const payload = JSON.parse(process.env.PAYLOAD);
            const gistId = process.env.GIST_ID;
            const gistToken = process.env.GIST_TOKEN;
            const gistUrl = 'https://api.github.com/gists/' + gistId;
            const headers = { 
              'Authorization': 'token ' + gistToken, 
              'Accept': 'application/vnd.github.v3+json',
              'Content-Type': 'application/json'
            };
            
            try {
              // 1. Single Fetch for all DB files
              const gistReq = await fetch(gistUrl, { headers });
              const gistData = await gistReq.json();
              
              let users = JSON.parse(gistData.files['users.json'].content || '[]');
              let votes = JSON.parse(gistData.files['votes.json'].content || '[]');
              let polls = JSON.parse(gistData.files['polls.json'].content || '[]');
              
              // 2. Logic & Validations (O(n) complexity)
              const user = users.find(u => u.token === payload.token);
              if (!user) throw new Error('Unauthorized');

              const poll = polls.find(p => p.id === payload.pollId);
              if (!poll || poll.status === 'closed') throw new Error('Election Closed');

              if (votes.find(v => v.pollId === payload.pollId && v.userId === user.id)) throw new Error('Already Voted');

              // 3. Update State
              votes.push({ 
                pollId: payload.pollId, 
                userId: user.id, 
                optionIndex: payload.optionIndex,
                timestamp: new Date().toISOString() 
              });

              // 4. Map Results
              const publicPolls = polls.map(p => {
                const pVotes = votes.filter(v => v.pollId === p.id);
                const results = p.options.map((_, i) => pVotes.filter(v => v.optionIndex === i).length);
                return { ...p, results };
              });

              // 5. Final Patch (Database Sync)
              const response = await fetch(gistUrl, {
                method: 'PATCH',
                headers,
                body: JSON.stringify({
                  files: {
                    'votes.json': { content: JSON.stringify(votes) },
                    'public_polls.json': { content: JSON.stringify(publicPolls) },
                    'polls.json': { content: JSON.stringify(publicPolls) },
                    ['res-' + payload.requestId + '.json']: { 
                      content: JSON.stringify({ status: 200, message: 'Vote Counted' }) 
                    }
                  }
                })
              });

              if (response.ok) console.log('Speed: Vote Processed in ms');

            } catch (e) {
              await fetch(gistUrl, {
                method: 'PATCH',
                headers,
                body: JSON.stringify({
                  files: { 
                    ['res-' + payload.requestId + '.json']: { 
                      content: JSON.stringify({ status: 400, error: e.message }) 
                    } 
                  }
                })
              });
              process.exit(1);
            }
          }
          run();
          "
