name: Vote Backend (Gist DB)
on:
  workflow_dispatch:
    inputs:
      payload:
        required: true

permissions:
  contents: write

jobs:
  vote-logic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Process Vote
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          PAYLOAD: ${{ github.event.inputs.payload }}
        run: |
          node -e "
          const fs = require('fs');
          async function run() {
            const payload = JSON.parse(process.env.PAYLOAD);
            const gistUrl = 'https://api.github.com/gists/' + process.env.GIST_ID;
            const headers = { 'Authorization': 'token ' + process.env.GIST_TOKEN, 'Accept': 'application/vnd.github.v3+json' };
            
            const gistReq = await fetch(gistUrl, { headers });
            const gistData = await gistReq.json();
            
            let users = JSON.parse(gistData.files['users.json'].content);
            let votes = JSON.parse(gistData.files['votes.json'].content || '[]');
            let polls = JSON.parse(gistData.files['polls.json'].content || '[]');
            let responseData = {};

            try {
                const user = users.find(u => u.token === payload.token);
                if (!user) throw new Error('Unauthorized');

                if (votes.find(v => v.pollId === payload.pollId && v.userId === user.id)) throw new Error('Already voted');

                votes.push({ pollId: payload.pollId, userId: user.id, optionIndex: payload.optionIndex });

                const publicPolls = polls.map(p => {
                    const pVotes = votes.filter(v => v.pollId === p.id);
                    const results = p.options.map((_, i) => pVotes.filter(v => v.optionIndex === i).length);
                    return { ...p, results };
                });

                await fetch(gistUrl, {
                    method: 'PATCH',
                    headers,
                    body: JSON.stringify({
                        files: {
                            'votes.json': { content: JSON.stringify(votes, null, 2) },
                            'public_polls.json': { content: JSON.stringify(publicPolls, null, 2) },
                            ['res-' + payload.requestId + '.json']: { content: JSON.stringify({ status: 200, message: 'Vote counted!' }) }
                        }
                    })
                });
            } catch (e) {
                await fetch(gistUrl, {
                    method: 'PATCH',
                    headers,
                    body: JSON.stringify({ files: { ['res-' + payload.requestId + '.json']: { content: JSON.stringify({ status: 400, error: e.message }) } } })
                });
            }
          }
          run();
          "
