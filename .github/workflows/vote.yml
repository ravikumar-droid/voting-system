name: Vote Backend (Gist DB)
on:
  workflow_dispatch:
    inputs:
      payload:
        required: true

permissions:
  contents: write

# Prevents multiple votes from conflicting during the database update
concurrency: 
  group: gist-database-lock
  cancel-in-progress: false 

jobs:
  vote-logic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - name: Process Vote Securely
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          PAYLOAD: ${{ github.event.inputs.payload }}
        run: |
          node -e "
          async function run() {
            const payload = JSON.parse(process.env.PAYLOAD);
            const gistId = process.env.GIST_ID;
            const gistToken = process.env.GIST_TOKEN;
            const gistUrl = 'https://api.github.com/gists/' + gistId;
            const headers = { 'Authorization': 'token ' + gistToken, 'Accept': 'application/vnd.github.v3+json' };
            
            try {
              // 1. Fetch current database state
              const gistReq = await fetch(gistUrl, { headers });
              const gistData = await gistReq.json();
              
              let users = JSON.parse(gistData.files['users.json'].content || '[]');
              let votes = JSON.parse(gistData.files['votes.json'].content || '[]');
              let polls = JSON.parse(gistData.files['polls.json'].content || '[]');
              
              // 2. VALIDATION: Check User
              const user = users.find(u => u.token === payload.token);
              if (!user) throw new Error('Unauthorized: Please log in again.');

              // 3. VALIDATION: Check Poll Status
              const poll = polls.find(p => p.id === payload.pollId);
              if (!poll) throw new Error('Election not found.');
              
              // CRITICAL: Block voting if the election is closed
              if (poll.status === 'closed') {
                throw new Error('This election has ended. No more votes are accepted.');
              }

              // 4. VALIDATION: Prevent Duplicate Voting
              const alreadyVoted = votes.find(v => v.pollId === payload.pollId && v.userId === user.id);
              if (alreadyVoted) throw new Error('You have already cast your vote for this election.');

              // 5. RECORD THE VOTE
              votes.push({ 
                pollId: payload.pollId, 
                userId: user.id, 
                optionIndex: payload.optionIndex,
                timestamp: new Date().toISOString() 
              });

              // 6. UPDATE PUBLIC RESULTS & STATS
              const publicPolls = polls.map(p => {
                const pollVotes = votes.filter(v => v.pollId === p.id);
                const results = p.options.map((_, i) => pollVotes.filter(v => v.optionIndex === i).length);
                return { ...p, results };
              });

              // 7. SYNC ALL DATA BACK TO GIST
              await fetch(gistUrl, {
                method: 'PATCH',
                headers,
                body: JSON.stringify({
                  files: {
                    'votes.json': { content: JSON.stringify(votes, null, 2) },
                    'public_polls.json': { content: JSON.stringify(publicPolls, null, 2) },
                    'polls.json': { content: JSON.stringify(publicPolls, null, 2) },
                    ['res-' + payload.requestId + '.json']: { 
                      content: JSON.stringify({ status: 200, message: 'Your vote has been recorded securely.' }) 
                    }
                  }
                })
              });
              
              console.log('Vote processed successfully.');

            } catch (e) {
              console.error('Voting Error:', e.message);
              // Send error back to frontend
              await fetch(gistUrl, {
                method: 'PATCH',
                headers,
                body: JSON.stringify({
                  files: { 
                    ['res-' + payload.requestId + '.json']: { 
                      content: JSON.stringify({ status: 400, error: e.message }) 
                    } 
                  }
                })
              });
            }
          }
          run();
          "
