on:
  workflow_dispatch:
    inputs:
      payload:
        required: true

# Concurrency is kept for data integrity but group is minified
concurrency: 
  group: v_lock
  cancel-in-progress: false 

jobs:
  v:
    runs-on: ubuntu-20.04 # 20.04 initializes 3-5 seconds faster than 'latest'
    steps:
      - env:
          G: ${{ secrets.GIST_TOKEN }}
          I: ${{ secrets.GIST_ID }}
          P: ${{ github.event.inputs.payload }}
        run: |
          # Turbo-Naked Execution: No checkout, No setup. Execution starts in < 2s.
          node -e "
          async function turbo() {
            const p = JSON.parse(process.env.P);
            const u = 'https://api.github.com/gists/' + process.env.I;
            const h = { 'Authorization': 'token ' + process.env.G, 'Accept': 'application/vnd.github.v3+json' };
            
            try {
              const g = await (await fetch(u, { headers: h })).json();
              
              let us = JSON.parse(g.files['users.json'].content);
              let vo = JSON.parse(g.files['votes.json'].content || '[]');
              let po = JSON.parse(g.files['polls.json'].content || '[]');
              
              const user = us.find(x => x.token === p.token);
              const poll = po.find(x => x.id === p.pollId);

              if (!user || !poll || poll.status === 'closed') throw new Error('Invalid');
              if (vo.find(x => x.pollId === p.pollId && x.userId === user.id)) throw new Error('Duplicate');

              // Logic
              vo.push({ pollId: p.pollId, userId: user.id, optionIndex: p.optionIndex });

              const upd = po.map(x => {
                const v = vo.filter(y => y.pollId === x.id);
                return { ...x, results: x.options.map((_, i) => v.filter(z => z.optionIndex === i).length) };
              });

              // High-speed minified Patch
              await fetch(u, {
                method: 'PATCH',
                headers: h,
                body: JSON.stringify({
                  files: {
                    'votes.json': { content: JSON.stringify(vo) },
                    'public_polls.json': { content: JSON.stringify(upd) },
                    'polls.json': { content: JSON.stringify(upd) },
                    ['res-' + p.requestId + '.json']: { content: JSON.stringify({ status: 200 }) }
                  }
                })
              });
            } catch (e) {
              await fetch(u, {
                method: 'PATCH',
                headers: h,
                body: JSON.stringify({ files: { ['res-' + p.requestId + '.json']: { content: JSON.stringify({ status: 400, error: e.message }) } } })
              });
            }
          }
          turbo();
          "
