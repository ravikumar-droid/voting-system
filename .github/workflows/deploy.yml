name: Secure Deploy
on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Secret
        run: |
          # We are searching for "TOKEN_PLACEHOLDER" and replacing it with your Secret GH_PAT
          sed -i 's/TOKEN_PLACEHOLDER/${{ secrets.GH_PAT }}/g' js/api.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
