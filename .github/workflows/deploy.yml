name: Secure Deploy
on:
  push:
    branches: [ main ]

# Grant the necessary permissions for GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Secret
        run: |
          # Replace the placeholder with your secret GH_PAT
          sed -i "s/TOKEN_PLACEHOLDER/${{ secrets.GH_PAT }}/g" js/api.js

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: '.' # Upload the root directory

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
