<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SecureVote | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/api.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
    <nav class="bg-white border-b p-4 shadow-sm flex justify-between items-center px-10">
        <h1 class="text-2xl font-bold text-blue-600">SecureVote</h1>
        <div class="flex items-center gap-6">
            <span id="welcomeUser" class="font-medium text-slate-600"></span>
            <button onclick="logout()" class="bg-red-50 text-red-600 px-4 py-2 rounded-lg hover:bg-red-100 font-semibold">Logout</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-10">
        <div id="loader" class="text-center py-20">
            <p class="text-slate-400 animate-pulse">Fetching active polls...</p>
        </div>

        <div id="pollsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-8 hidden">
            <!-- Polls injected here -->
        </div>
    </main>

    <script>
        if (!localStorage.getItem('token')) window.location.href = 'index.html';
        document.getElementById('welcomeUser').innerText = "Hello, " + localStorage.getItem('username');

        let charts = {};

        async function initDashboard() {
            try {
                const polls = await fetchPollResults();
                document.getElementById('loader').classList.add('hidden');
                const grid = document.getElementById('pollsGrid');
                grid.classList.remove('hidden');

                grid.innerHTML = polls.map(poll => `
                    <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                        <h3 class="text-xl font-bold mb-6">${poll.question}</h3>
                        <div class="space-y-3 mb-8">
                            ${poll.options.map((opt, i) => `
                                <button onclick="vote('${poll.id}', ${i})" class="w-full text-left p-4 rounded-xl border border-slate-100 bg-slate-50 hover:bg-blue-600 hover:text-white transition-all font-medium">
                                    ${opt}
                                </button>
                            `).join('')}
                        </div>
                        <div class="pt-6 border-t">
                            <canvas id="chart-${poll.id}"></canvas>
                        </div>
                    </div>
                `).join('');

                polls.forEach(renderChart);
            } catch (e) { console.error(e); }
        }

        function renderChart(poll) {
            const ctx = document.getElementById(`chart-${poll.id}`);
            charts[poll.id] = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: poll.options,
                    datasets: [{
                        data: poll.results,
                        backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6']
                    }]
                },
                options: { plugins: { legend: { position: 'bottom' } } }
            });
        }

        async function vote(pollId, optionIndex) {
            if (!confirm("Confirm your vote? This cannot be undone.")) return;
            try {
                alert("Submitting to GitHub Actions... this takes about 20 seconds.");
                await dispatchAction('vote', { 
                    token: localStorage.getItem('token'), 
                    pollId, 
                    optionIndex 
                });
                location.reload();
            } catch (e) { alert("Error: " + e); }
        }

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
        
        initDashboard();
        setInterval(initDashboard, 15000); // Auto-refresh every 15s
    </script>
</body>
</html>
