<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureVote | Voting Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/api.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans">

    <!-- NAVBAR -->
    <nav class="bg-white border-b sticky top-0 z-10 p-4 shadow-sm flex justify-between items-center px-6 md:px-20">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-black italic">V</div>
            <h1 class="text-xl font-black text-slate-900 tracking-tighter">SECUREVOTE</h1>
        </div>
        <div class="flex items-center gap-4 md:gap-8">
            <div class="hidden md:block text-right">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Active Voter</p>
                <span id="welcomeUser" class="font-black text-blue-600 text-sm"></span>
            </div>
            <button onclick="logout()" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl hover:bg-red-100 transition-colors font-bold text-sm">Logout</button>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="max-w-6xl mx-auto p-6 md:p-12">
        <header class="mb-12">
            <h2 class="text-3xl font-black text-slate-900">Current Elections</h2>
            <p class="text-slate-500 font-medium">Cast your vote securely. Your identity remains anonymous.</p>
        </header>

        <!-- LOADING STATE -->
        <div id="loader" class="flex flex-col items-center justify-center py-20">
            <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-slate-400 mt-4 font-bold animate-pulse uppercase text-xs tracking-widest">Syncing with Gist Database...</p>
        </div>

        <!-- POLLS GRID -->
        <div id="pollsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-10 hidden">
            <!-- Cards injected here -->
        </div>
    </main>

    <script>
        // Security Check: Redirect if not logged in
        if (!localStorage.getItem('token')) window.location.replace('index.html');
        document.getElementById('welcomeUser').innerText = localStorage.getItem('username');

        let charts = {};

        async function initDashboard() {
            try {
                const polls = await fetchPollResults();
                document.getElementById('loader').classList.add('hidden');
                const grid = document.getElementById('pollsGrid');
                grid.classList.remove('hidden');

                grid.innerHTML = polls.map(poll => {
                    // Statistics Logic
                    const totalVotes = poll.results.reduce((a, b) => a + b, 0);
                    const maxVotes = Math.max(...poll.results);
                    const winnerIndex = poll.results.indexOf(maxVotes);
                    const leadingCandidate = totalVotes > 0 ? poll.options[winnerIndex] : "No votes";
                    const isClosed = poll.status === 'closed';

                    return `
                        <div class="bg-white rounded-3xl shadow-xl shadow-slate-200/50 border overflow-hidden transition-all ${isClosed ? 'border-slate-200 opacity-90' : 'border-white hover:border-blue-400'}">
                            
                            <!-- Header -->
                            <div class="p-8 pb-4 flex justify-between items-start">
                                <div>
                                    <h3 class="text-2xl font-black text-slate-800 leading-tight">${poll.question}</h3>
                                    <span class="inline-flex items-center gap-1.5 mt-2 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter ${isClosed ? 'bg-slate-100 text-slate-500' : 'bg-emerald-100 text-emerald-600'}">
                                        <span class="w-1.5 h-1.5 rounded-full ${isClosed ? 'bg-slate-400' : 'bg-emerald-500 animate-pulse'}"></span>
                                        ${isClosed ? 'Election Ended' : 'Live Election'}
                                    </span>
                                </div>
                            </div>

                            <!-- Analytics Summary -->
                            <div class="px-8 grid grid-cols-2 gap-4 mb-6">
                                <div class="bg-slate-50 rounded-2xl p-4 border border-slate-100">
                                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Turnout</p>
                                    <p class="text-xl font-black text-slate-800">${totalVotes} <span class="text-xs font-normal text-slate-400">Votes</span></p>
                                </div>
                                <div class="bg-blue-50 rounded-2xl p-4 border border-blue-100">
                                    <p class="text-[10px] font-bold text-blue-400 uppercase tracking-widest">${isClosed ? 'Winner' : 'Leading'}</p>
                                    <p class="text-lg font-black text-blue-700 truncate">${leadingCandidate}</p>
                                </div>
                            </div>

                            <!-- Vote Buttons / Results List -->
                            <div class="px-8 space-y-3 mb-8">
                                ${poll.options.map((opt, i) => {
                                    const percentage = totalVotes > 0 ? Math.round((poll.results[i] / totalVotes) * 100) : 0;
                                    return `
                                        <button 
                                            ${isClosed ? 'disabled' : ''} 
                                            onclick="vote('${poll.id}', ${i})" 
                                            class="group relative w-full overflow-hidden rounded-2xl border transition-all 
                                            ${isClosed ? 'bg-slate-50 cursor-default border-slate-100' : 'bg-white hover:border-blue-500 hover:shadow-md border-slate-200 active:scale-95'}">
                                            
                                            <!-- Percentage Bar (Only visible if votes exist) -->
                                            <div class="absolute inset-y-0 left-0 bg-blue-500 transition-all duration-1000 ${isClosed ? 'opacity-20' : 'opacity-10'}" style="width: ${percentage}%"></div>
                                            
                                            <div class="relative p-4 flex justify-between items-center z-0">
                                                <span class="font-bold text-slate-700 ${!isClosed ? 'group-hover:text-blue-600' : ''}">${opt}</span>
                                                <div class="text-right">
                                                    <span class="block text-sm font-black text-slate-800">${poll.results[i]}</span>
                                                    <span class="block text-[10px] font-bold text-slate-400">${percentage}%</span>
                                                </div>
                                            </div>
                                        </button>
                                    `;
                                }).join('')}
                            </div>

                            <!-- Chart Visualization -->
                            <div class="p-8 pt-0 bg-slate-50/50">
                                <canvas id="chart-${poll.id}" height="180"></canvas>
                            </div>
                        </div>
                    `;
                }).join('');

                // Render all charts after HTML is injected
                polls.forEach(renderChart);
            } catch (e) {
                console.error("Dashboard Init Error", e);
            }
        }

        function renderChart(poll) {
            const ctx = document.getElementById(`chart-${poll.id}`);
            // Destroy existing chart if it exists to allow refreshing
            if (charts[poll.id]) charts[poll.id].destroy();

            charts[poll.id] = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: poll.options,
                    datasets: [{
                        data: poll.results,
                        backgroundColor: poll.status === 'closed' ? '#cbd5e1' : '#3b82f6',
                        borderRadius: 8,
                        borderSkipped: false
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { display: false } 
                    },
                    scales: {
                        x: { display: false, grid: { display: false } },
                        y: { 
                            grid: { display: false },
                            ticks: { font: { weight: 'bold', size: 10 } }
                        }
                    }
                }
            });
        }

        async function vote(pollId, optionIndex) {
            if (!confirm("Confirm your vote? This action is permanent and recorded on the blockchain (simulated).")) return;
            
            try {
                // Show temporary overlay to prevent multiple clicks
                const status = document.createElement('div');
                status.className = "fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center text-white font-bold";
                status.innerHTML = "Processing Vote on GitHub Actions... (approx 15s)";
                document.body.appendChild(status);

                await dispatchAction('vote', { 
                    token: localStorage.getItem('token'), 
                    pollId, 
                    optionIndex 
                });
                
                location.reload();
            } catch (e) { 
                alert("Voting Error: " + e); 
                location.reload();
            }
        }

        function logout() {
            localStorage.clear();
            window.location.replace('index.html');
        }
        
        // Initial dashboard load
        initDashboard();

        // Refresh statistics every 20 seconds to show live vote updates
        setInterval(initDashboard, 20000);
    </script>
</body>
</html>
