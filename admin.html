<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureVote | Admin Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/api.js"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <nav class="bg-white border-b sticky top-0 z-10 p-4 shadow-sm">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-blue-600 tracking-tighter">ADMIN TERMINAL</h1>
            <div class="flex gap-4">
                <a href="dashboard.html" class="bg-slate-100 px-4 py-2 rounded-lg font-bold text-slate-600 hover:bg-blue-50 hover:text-blue-600 transition-all">View Live Results</a>
                <button onclick="localStorage.clear(); location.href='index.html'" class="text-red-500 font-bold px-4 py-2">Logout</button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6 lg:p-10">
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- LEFT COLUMN: CREATE POLL -->
            <div class="lg:col-span-1 space-y-8">
                <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                        <span class="w-2 h-6 bg-blue-600 rounded-full"></span>
                        Create New Election
                    </h2>
                    <div class="space-y-4">
                        <div>
                            <label class="text-xs font-bold text-slate-400 uppercase">Question</label>
                            <input type="text" id="pollQ" placeholder="e.g. Who should be Class Rep?" class="w-full mt-1 border p-3 rounded-xl bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-slate-400 uppercase">Candidates / Options</label>
                            <textarea id="pollO" placeholder="Option 1, Option 2, Option 3" class="w-full mt-1 border p-3 rounded-xl bg-slate-50 h-24 focus:ring-2 focus:ring-blue-500 outline-none transition-all"></textarea>
                            <p class="text-[10px] text-slate-400 mt-1 italic">* Separate names with commas</p>
                        </div>
                        <button onclick="createNewPoll()" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all active:scale-95">
                            PUBLISH ELECTION
                        </button>
                    </div>
                </div>

                <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-xl font-bold mb-6">User Database</h2>
                    <div id="userList" class="space-y-3 max-h-64 overflow-y-auto pr-2">
                        <p class="text-slate-400 animate-pulse">Syncing users...</p>
                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN: MANAGE LIVE ELECTIONS & STATS -->
            <div class="lg:col-span-2">
                <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 min-h-[600px]">
                    <div class="flex justify-between items-center mb-8">
                        <h2 class="text-2xl font-bold flex items-center gap-2">
                            <span class="w-2 h-6 bg-emerald-500 rounded-full"></span>
                            Live Election Management
                        </h2>
                        <button onclick="refreshData()" class="text-blue-600 text-sm font-bold hover:bg-blue-50 px-3 py-1 rounded">Refresh Data</button>
                    </div>

                    <div id="adminPollsList" class="grid grid-cols-1 gap-6">
                        <!-- Poll Management Cards Injected Here -->
                        <div class="flex flex-col items-center justify-center py-20 text-slate-300">
                            <svg class="w-16 h-16 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                            <p class="font-bold">No elections found in database.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 1. Security & Auth Check
        if (localStorage.getItem('role') !== 'admin') {
            window.location.replace('index.html');
        }

        async function createNewPoll() {
            const q = document.getElementById('pollQ').value;
            const oStr = document.getElementById('pollO').value;
            if(!q || !oStr) return alert("Please fill in all fields.");
            
            const options = oStr.split(',').map(s => s.trim()).filter(s => s.length > 0);
            if(options.length < 2) return alert("At least 2 candidates are required.");

            try {
                alert("Requesting GitHub to start election... (takes ~15s)");
                await dispatchAction('admin_create_poll', { 
                    token: localStorage.getItem('token'), 
                    question: q, 
                    options: options 
                });
                location.reload();
            } catch (e) { alert("Admin Error: " + e); }
        }

        async function toggleElectionStatus(pollId) {
            if(!confirm("Change election status? Users cannot vote in closed elections.")) return;
            try {
                alert("Updating status...");
                await dispatchAction('admin_toggle_poll', { 
                    token: localStorage.getItem('token'), 
                    pollId: pollId 
                });
                location.reload();
            } catch (e) { alert(e); }
        }

        async function refreshData() {
            try {
                const url = `https://api.github.com/gists/${GIST_ID}?t=${Date.now()}`;
                const res = await fetch(url, { headers: { 'Authorization': `token ${GH_PAT}` } });
                const gistData = await res.json();
                
                const polls = JSON.parse(gistData.files['public_polls.json'].content);
                const users = JSON.parse(gistData.files['users.json'].content);

                renderPolls(polls);
                renderUsers(users);
            } catch (e) { console.error("Data Sync Failed", e); }
        }

        function renderPolls(polls) {
            const container = document.getElementById('adminPollsList');
            if(polls.length === 0) return;

            container.innerHTML = polls.map(poll => {
                const totalVotes = poll.results.reduce((a, b) => a + b, 0);
                const maxVotes = Math.max(...poll.results);
                const winnerIndex = poll.results.indexOf(maxVotes);
                const winnerName = totalVotes > 0 ? poll.options[winnerIndex] : "None";
                const isClosed = poll.status === 'closed';

                return `
                    <div class="border rounded-2xl p-6 transition-all ${isClosed ? 'bg-slate-50 border-slate-200' : 'bg-white border-blue-100 shadow-sm'}">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-lg font-bold text-slate-800">${poll.question}</h3>
                                <p class="text-xs font-bold ${isClosed ? 'text-red-500' : 'text-emerald-500'} uppercase tracking-widest mt-1">
                                    ● ${isClosed ? 'Election Ended' : 'Live Now'}
                                </p>
                            </div>
                            <button onclick="toggleElectionStatus('${poll.id}')" 
                                class="px-4 py-2 rounded-lg text-xs font-black uppercase transition-all ${isClosed ? 'bg-emerald-500 text-white hover:bg-emerald-600' : 'bg-red-500 text-white hover:bg-red-600'}">
                                ${isClosed ? 'Open Election' : 'Stop Election'}
                            </button>
                        </div>

                        <div class="grid grid-cols-3 gap-4 mb-6">
                            <div class="bg-white border rounded-xl p-3 text-center">
                                <p class="text-[10px] uppercase font-bold text-slate-400">Turnout</p>
                                <p class="text-xl font-black">${totalVotes}</p>
                            </div>
                            <div class="bg-white border rounded-xl p-3 text-center col-span-2 border-l-4 border-l-blue-500">
                                <p class="text-[10px] uppercase font-bold text-slate-400 text-left pl-2">Current Winner</p>
                                <p class="text-lg font-black text-blue-600 text-left pl-2 truncate">${winnerName}</p>
                            </div>
                        </div>

                        <div class="space-y-2">
                            ${poll.options.map((opt, i) => {
                                const percent = totalVotes > 0 ? Math.round((poll.results[i] / totalVotes) * 100) : 0;
                                return `
                                    <div class="relative w-full h-8 bg-slate-100 rounded-lg overflow-hidden border">
                                        <div class="absolute inset-0 bg-blue-500 opacity-20" style="width: ${percent}%"></div>
                                        <div class="absolute inset-0 flex justify-between items-center px-3 text-xs font-bold">
                                            <span>${opt}</span>
                                            <span>${poll.results[i]} votes (${percent}%)</span>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderUsers(users) {
            const container = document.getElementById('userList');
            container.innerHTML = users.map(u => `
                <div class="flex justify-between items-center p-3 rounded-xl border bg-slate-50">
                    <div class="truncate pr-4">
                        <p class="text-sm font-bold text-slate-700">${u.username}</p>
                        <p class="text-[10px] text-slate-400 font-bold uppercase">${u.role}</p>
                    </div>
                    <span class="text-[10px] font-black px-2 py-1 rounded bg-white border text-slate-500 uppercase">${u.status}</span>
                </div>
            `).join('');
        }

        // Initial Load
        refreshData();
        // Auto-refresh stats every 30 seconds
        setInterval(refreshData, 30000);
    </script>
</body>
</html>
