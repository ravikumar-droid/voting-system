<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SecureVote | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- This tries to load from the folder 'js' -->
    <script src="js/api.js"></script>
    
    <!-- This tries to load from the root (if the folder doesn't exist) -->
    <script src="api.js"></script>
</head>
<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen">
    <div class="bg-slate-800 p-10 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700">
        <h1 class="text-4xl font-extrabold text-blue-500 text-center mb-10">SecureVote</h1>

        <div class="space-y-6">
            <input type="text" id="username" class="w-full bg-slate-700 p-3 rounded-lg border border-slate-600 outline-none focus:ring-2 focus:ring-blue-500" placeholder="Username">
            <input type="password" id="password" class="w-full bg-slate-700 p-3 rounded-lg border border-slate-600 outline-none focus:ring-2 focus:ring-blue-500" placeholder="Password">
            
            <button onclick="handleAuth('login')" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition-all">Login</button>
            <button onclick="handleAuth('register')" class="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 rounded-lg border border-slate-600">Register</button>
        </div>

        <div id="statusBox" class="mt-8 hidden p-4 rounded-lg bg-slate-900/50 border border-blue-500/30">
            <p id="statusMsg" class="text-sm text-center text-blue-400 font-bold"></p>
        </div>
    </div>

    <script>
        async function handleAuth(type) {
            const statusBox = document.getElementById('statusBox');
            const statusMsg = document.getElementById('statusMsg');
            statusBox.classList.remove('hidden');

            // 🔍 DIAGNOSTIC CHECK
            if (typeof dispatchAction === "undefined") {
                statusMsg.innerText = "❌ API Error: 'api.js' file not found. Check your GitHub folders!";
                statusMsg.classList.replace('text-blue-400', 'text-red-400');
                console.error("The browser could not find api.js in /js/api.js or /api.js");
                return;
            }

            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if(!u || !p) return alert("Fill in fields");

            statusMsg.innerText = "Connecting to Secure Backend...";
            statusMsg.classList.replace('text-red-400', 'text-blue-400');

            try {
                const res = await dispatchAction(type, { username: u, password: p });
                if (type === 'login') {
                    localStorage.setItem('token', res.token);
                    localStorage.setItem('username', res.username);
                    window.location.href = (res.role === 'admin') ? 'admin.html' : 'dashboard.html';
                } else {
                    statusMsg.innerText = res.message;
                }
            } catch (e) {
                statusMsg.innerText = "Error: " + e;
                statusMsg.classList.replace('text-blue-400', 'text-red-400');
            }
        }
    </script>
</body>
</html>
