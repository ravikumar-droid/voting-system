<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SecureVote | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 1. Check this path matches exactly! -->
    <script src="js/api.js" onerror="alert('CRITICAL ERROR: Could not load js/api.js. Check your folder structure!')"></script>
</head>
<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen">
    <div class="bg-slate-800 p-10 rounded-2xl shadow-2xl w-full max-w-md">
        <h1 class="text-4xl font-bold text-blue-500 text-center mb-10">SecureVote</h1>

        <div class="space-y-6">
            <input type="text" id="username" class="w-full bg-slate-700 p-3 rounded" placeholder="Username">
            <input type="password" id="password" class="w-full bg-slate-700 p-3 rounded" placeholder="Password">
            
            <button onclick="handleAuth('login')" class="w-full bg-blue-600 p-3 rounded font-bold">Login</button>
            <button onclick="handleAuth('register')" class="w-full border border-slate-600 p-3 rounded font-bold">Register</button>
        </div>

        <div id="statusBox" class="mt-8 hidden p-4 rounded bg-slate-700">
            <p id="statusMsg" class="text-sm text-center font-bold text-blue-400"></p>
        </div>
    </div>

    <script>
        async function handleAuth(type) {
            // 2. Check if the function exists before calling it
            if (typeof dispatchAction === "undefined") {
                const msg = "Error: The API is not loaded. Check your browser console (F12) for 404 errors.";
                document.getElementById('statusBox').classList.remove('hidden');
                document.getElementById('statusMsg').innerText = msg;
                console.error(msg);
                return;
            }

            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const statusMsg = document.getElementById('statusMsg');
            document.getElementById('statusBox').classList.remove('hidden');

            try {
                const res = await dispatchAction(type, { username: u, password: p });
                if (type === 'login') {
                    localStorage.setItem('token', res.token);
                    localStorage.setItem('username', res.username);
                    window.location.href = 'dashboard.html';
                } else {
                    statusMsg.innerText = res.message;
                }
            } catch (e) {
                statusMsg.innerText = "Error: " + e;
            }
        }
    </script>
</body>
</html>
