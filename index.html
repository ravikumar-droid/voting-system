<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Voting - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/api.js" defer></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-lg shadow-xl w-96">
        <h2 class="text-2xl font-bold mb-6 text-center">Voting Portal</h2>
        
        <form class="space-y-4">
            <input type="text" id="username" placeholder="Username" class="w-full p-3 border rounded" required>
            <input type="password" id="password" placeholder="Password" class="w-full p-3 border rounded" required>
            
            <button type="button" onclick="handleLogin()" class="w-full bg-blue-600 text-white p-3 rounded hover:bg-blue-700 font-bold">Login</button>
            <button type="button" onclick="handleRegister()" class="w-full bg-green-600 text-white p-3 rounded hover:bg-green-700 font-bold">Register</button>
        </form>
        <p id="statusMsg" class="mt-4 text-sm text-center font-bold text-blue-500"></p>
    </div>

    <script>
        async function handleLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const status = document.getElementById('statusMsg');
            
            status.innerText = "Logging in... (Connecting to secure vault)";
            status.className = "mt-4 text-sm text-center font-bold text-blue-500";
            
            try {
                const res = await dispatchAction('login', { username: u, password: p });
                localStorage.setItem('token', res.token);
                localStorage.setItem('userId', res.userId);
                window.location.href = 'dashboard.html';
            } catch (e) {
                status.innerText = `Error: ${e}`;
                status.className = "mt-4 text-sm text-center font-bold text-red-500";
            }
        }

        async function handleRegister() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            document.getElementById('statusMsg').innerText = "Registering... Waking up backend.";
            
            try {
                const res = await dispatchAction('register', { username: u, password: p });
                document.getElementById('statusMsg').innerText = res.message;
            } catch (e) {
                document.getElementById('statusMsg').innerText = `Error: ${e}`;
            }
        }
    </script>
</body>
</html>
