<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Voting System - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/api.js" defer></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-4xl font-bold mb-8">Admin Dashboard</h1>

        <!-- Create Poll Section -->
        <div class="bg-white p-6 rounded shadow-lg mb-8">
            <h2 class="text-xl font-bold mb-4">Create New Poll</h2>
            <div class="space-y-4">
                <input type="text" id="pollQuestion" placeholder="Poll Question" class="w-full p-2 border rounded">
                <input type="text" id="pollOptions" placeholder="Options (comma separated: Yes, No, Maybe)" class="w-full p-2 border rounded">
                <button onclick="createPoll()" class="bg-blue-600 text-white px-6 py-2 rounded">Create Poll</button>
            </div>
        </div>

        <!-- User Management Section -->
        <div class="bg-white p-6 rounded shadow-lg">
            <h2 class="text-xl font-bold mb-4">User Approvals</h2>
            <div id="userList" class="space-y-2">
                <p class="text-gray-500 italic">Loading users...</p>
            </div>
        </div>
        
        <p id="statusMsg" class="mt-4 font-bold text-blue-600"></p>
    </div>

    <script>
        // Update js/api.js to include 'admin_create_poll' and 'admin_approve_user'
        async function createPoll() {
            const q = document.getElementById('pollQuestion').value;
            const o = document.getElementById('pollOptions').value.split(',').map(x => x.trim());
            document.getElementById('statusMsg').innerText = "Processing poll creation...";
            
            try {
                await dispatchAction('admin_create_poll', { 
                    token: localStorage.getItem('token'), 
                    question: q, 
                    options: o 
                });
                alert("Poll created!");
                location.reload();
            } catch (e) { alert(e); }
        }

        async function loadUsers() {
            const res = await fetch(`api/admin_user_list.json?t=${Date.now()}`);
            if(!res.ok) return;
            const users = await res.json();
            const container = document.getElementById('userList');
            container.innerHTML = users.map(u => `
                <div class="flex justify-between items-center p-3 border-b">
                    <span>${u.username} (${u.status})</span>
                    ${u.status === 'pending' ? 
                        `<button onclick="approveUser('${u.id}')" class="bg-green-500 text-white px-3 py-1 rounded text-sm">Approve</button>` 
                        : `<span class="text-green-600 font-bold">✓</span>`}
                </div>
            `).join('');
        }

        async function approveUser(userId) {
            document.getElementById('statusMsg').innerText = "Approving user...";
            try {
                await dispatchAction('admin_approve_user', { 
                    token: localStorage.getItem('token'), 
                    targetUserId: userId 
                });
                loadUsers();
            } catch (e) { alert(e); }
        }

        loadUsers();
    </script>
</body>
</html>
